<!DOCTYPE html>
<html lang="en">
<head>
    <title>PLV RESERVATION</title>
    <link rel="stylesheet" href="loginpage.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>

      <div class="menu">
        <div class="logo">
          CSMS
          <label for="menu"></label>
        </div>
      </div>

    <!-- LEFT IMAGE -->
<div class="container">

  <div class="left">
    <img src="ASSETS/plv maysan 1.png" alt="Building">
  </div>

    <!-- RIGHT FORM -->
    <div class="right">
      <div class="form-box">

        <h1>Get Started Now</h1>
        <p>Please log into your account to continue</p>

        <form>
          <label>Name</label>
          <input type="text" placeholder="Enter your name">

          <label>Email address</label>
          <input type="email" placeholder="example@email.com">

            <div class="password-label">
              <span>Password</span>
              <a href="#" class="forgot">Forget Password?</a>
            </div>
            <input type="password" placeholder="********">

            <div class="checkbox">
              <input type="checkbox">
              <span>I agree to the <a href="#">Terms & Privacy</a></span>
            </div>
            <a href="dashboard.html">
              <button type="button" class="submit-btn">Log in</button>
            </a>
          <p class="register">
            Don't have an account? <a href="#">Register Now</a>
          </p>
        </form>
      </div>
    </div>
</div>
</body>
</html>
