<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PLV CSMS — Campuses</title>
  <link rel="stylesheet" href="assets/css/campus.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    .loading-text { padding: 24px; color: #6b7280; font-size: 15px; }
  </style>
</head>
<body>
  <div class="menu">
    <input type="checkbox" id="menu"/>
    <div class="logo">CSMS <label for="menu"></label></div>
    <div class="items">
      <a href="dashboard.html" class="item"><img src="assets/img/home.png" class="nav-icon" alt="">Home</a>
      <a href="campus.html"    class="item"><img src="assets/img/clip.png" class="nav-icon" alt="">Reservation</a>
      <a href="#"              class="item"><img src="assets/img/info.png" class="nav-icon" alt="">About</a>
    </div>
  </div>

  <div class="dashboard-layout">
    <aside class="sidebar">
      <div class="sidebar-menu">
        <div class="sidebar-card sidebar-card--outline">
          <a href="profile2.html"><i class="fa-regular fa-circle-user" style="font-size:60px;color:#043AA3;"></i></a>
          <span>Profile</span>
        </div>
        <div class="sidebar-card sidebar-card--light">
          <a href="dashboard.html"><i class="fa-solid fa-table-cells-large" style="font-size:50px;color:#043AA3;"></i></a>
          <span>Dashboard</span>
        </div>
        <div class="sidebar-card sidebar-card--selected">
          <a href="campus.html"><i class="fa-regular fa-building" style="font-size:60px;color:#ffffff;"></i></a>
          <span>Campus</span>
        </div>
      </div>
      <button class="logout-btn" type="button">Log out</button>
    </aside>

    <main class="content">
      <section class="hero-row">
        <div class="hero-copy">
          <h1>
            <span class="accent">Schedule</span>
            <span class="your"> your</span><br>
            <span class="accent">Room</span>
          </h1>
          <a class="section-link" href="#">All Campuses</a>
        </div>
        <div class="hero-actions">
          <a href="dashboard.html"><button class="ghost-btn">My Room</button></a>
          <button class="solid-btn">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="9"></circle>
              <path d="M12 8v8"></path><path d="M8 12h8"></path>
            </svg>
            <span>Reserve Room</span>
          </button>
        </div>
      </section>

      <section class="schedule-panel">
        <div class="campus-grid" id="campusGrid">
          <p class="loading-text">Loading campuses…</p>
        </div>
      </section>
    </main>
  </div>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/campus-load.js"></script>
</body>
</html>
