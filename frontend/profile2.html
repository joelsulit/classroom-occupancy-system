<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PLV CSMS — Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/profile2.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
  <div class="menu">
    <input type="checkbox" id="menu"/>
    <div class="logo">CSMS <label for="menu"></label></div>
    <div class="items">
      <a href="dashboard.html" class="item"><img src="assets/img/home.png" class="nav-icon" alt="">Home</a>
      <a href="campus.html"    class="item"><img src="assets/img/clip.png" class="nav-icon" alt="">Reservation</a>
      <a href="#"              class="item"><img src="assets/img/info.png" class="nav-icon" alt="">About</a>
    </div>
  </div>

  <div class="dashboard-layout">
    <aside class="sidebar">
      <div class="sidebar-menu">
        <div class="sidebar-card sidebar-card--outline">
          <i class="fa-regular fa-circle-user" style="font-size:60px;color:white;"></i>
          <span>Profile</span>
        </div>
        <div class="sidebar-card sidebar-card--light">
          <a href="dashboard.html">
            <i class="fa-solid fa-table-cells-large" style="font-size:50px;color:#043AA3;"></i>
          </a>
          <span>Dashboard</span>
        </div>
        <div class="sidebar-card sidebar-card--selected">
          <a href="campus.html">
            <i class="fa-regular fa-building" style="font-size:60px;color:#043AA3;"></i>
          </a>
          <span>Campus</span>
        </div>
      </div>
      <button class="logout-btn" type="button">Log out</button>
    </aside>

    <main class="content">
      <div class="content-center">

        <div class="profile-card">
          <div class="card-header">
            <h1 id="profileGreeting">Hello!</h1>
            <button class="profile-btn">My Profile</button>
          </div>

          <div class="profile-content">
            <div class="avatar-wrapper">
              <img id="profile-pic" class="profile-avatar" src="assets/img/user2.png" alt="Profile Picture">
              <label for="upload" class="change-picture">Change Picture</label>
              <input type="file" id="upload" accept="image/*" style="display:none;">
            </div>

            <div class="info-block">
              <div class="info-row">
                <span class="label">Name:</span>
                <span id="profileName">—</span>
              </div>
              <div class="info-row">
                <span class="label">Role:</span>
                <span id="profileRole">—</span>
              </div>
              <div class="info-row">
                <span class="label">Course / Section:</span>
                <span id="profileCourseSection">—</span>
              </div>
              <div class="info-row">
                <span class="label">Student ID:</span>
                <span id="profileStudentId">—</span>
              </div>
              <div class="info-row">
                <span class="label">Email:</span>
                <span id="profileEmail">—</span>
              </div>
            </div>
          </div>
        </div>

        <div class="actions">
          <a href="dashboard.html"><button class="outline-btn">My Room</button></a>
          <a href="campus.html"><button class="filled-btn">Reserve Room</button></a>
        </div>
      </div>
    </main>
  </div>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/changepfp.js"></script>
  <script src="assets/js/profile-load.js"></script>
</body>
</html>
